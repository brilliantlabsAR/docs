<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" style="background-color: transparent;">
  <defs>
    <marker id="arrow-right" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
    <marker id="arrow-left" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#ffffff" />
    </marker>
  </defs>

  <style>
    rect { fill: none; stroke: #ffffff; stroke-width: 1.5; }
    text { fill: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-anchor: middle; }
    .title { font-size: 14px; }
    .part { font-size: 16px; font-weight: bold; }
    .label { font-size: 12px; }
    path, line { fill: none; stroke: #ffffff; stroke-width: 1.5; }
  </style>

  <rect x="500" y="150" width="220" height="540" />
  <text x="610" y="410" class="title">Main Processor</text>
  <text x="610" y="435" class="part" style="font-size: 20px;">Alif SoC</text>

  <rect x="850" y="150" width="180" height="60" />
  <text x="940" y="175" class="title">Display</text>
  <text x="940" y="195" class="part">OLEDoS</text>
  <line x1="720" y1="180" x2="840" y2="180" marker-end="url(#arrow-right)" />
  <text x="780" y="172" class="label">MIPI</text>

  <rect x="850" y="240" width="180" height="60" />
  <text x="940" y="265" class="title">Camera</text>
  <text x="940" y="285" class="part">PAG7982LT-02</text>
  <line x1="720" y1="270" x2="840" y2="270" marker-end="url(#arrow-right)" />
  <text x="780" y="262" class="label">LPCPI / I2C1 8bit</text>

  <rect x="850" y="330" width="180" height="60" />
  <text x="940" y="355" class="title">Accelerometer</text>
  <text x="940" y="375" class="part">BMA580</text>
  <line x1="720" y1="360" x2="840" y2="360" marker-end="url(#arrow-right)" />
  <text x="780" y="352" class="label">I2C0</text>

  <rect x="850" y="420" width="180" height="60" />
  <text x="940" y="445" class="title">Magnetic Sensor</text>
  <text x="940" y="465" class="part">QMC6308-TR</text>
  <line x1="720" y1="450" x2="840" y2="450" marker-end="url(#arrow-right)" />
  <text x="780" y="442" class="label">I2C0</text>

  <rect x="850" y="510" width="180" height="60" />
  <text x="940" y="535" class="title">MEMS Mic (Left)</text>
  <text x="940" y="555" class="part">T5838</text>
  <line x1="850" y1="540" x2="730" y2="540" marker-end="url(#arrow-left)" />
  <text x="790" y="532" class="label">PDM</text>

  <rect x="850" y="600" width="180" height="60" />
  <text x="940" y="625" class="title">MEMS Mic (Right)</text>
  <text x="940" y="645" class="part">T5838</text>
  <line x1="850" y1="630" x2="730" y2="630" marker-end="url(#arrow-left)" />
  <text x="790" y="622" class="label">PDM</text>

  <rect x="240" y="150" width="160" height="60" />
  <text x="320" y="175" class="title">Charger</text>
  <text x="320" y="195" class="part">Charger IC</text>
  <line x1="400" y1="180" x2="490" y2="180" marker-end="url(#arrow-right)" />
  <text x="445" y="172" class="label">Charger State</text>

  <rect x="240" y="240" width="160" height="60" />
  <text x="320" y="265" class="title">1.8V DCDC</text>
  <text x="320" y="285" class="part">TPS62802</text>
  <line x1="400" y1="270" x2="490" y2="270" marker-end="url(#arrow-right)" />
  <text x="445" y="262" class="label">1.8V</text>

  <rect x="240" y="330" width="160" height="60" />
  <text x="320" y="355" class="title">2.8V LDO</text>
  <text x="320" y="375" class="part">SGM20365</text>
  <line x1="400" y1="360" x2="490" y2="360" marker-end="url(#arrow-right)" />
  <text x="445" y="352" class="label">2.8V</text>

  <rect x="240" y="420" width="160" height="60" />
  <text x="320" y="445" class="title">4.3V DCDC</text>
  <text x="320" y="465" class="part">TPS62801YKA</text>
  <line x1="400" y1="450" x2="490" y2="450" marker-end="url(#arrow-right)" />
  <text x="445" y="442" class="label">4.3V</text>

  <rect x="240" y="510" width="160" height="60" />
  <text x="320" y="535" class="title">Audio PA</text>
  <text x="320" y="555" class="part">TPA2011D1</text>
  <line x1="500" y1="540" x2="410" y2="540" marker-end="url(#arrow-left)" />
  <text x="455" y="532" class="label">PWM</text>

  <rect x="240" y="600" width="160" height="60" />
  <text x="320" y="625" class="title">Wake up Button</text>
  <text x="320" y="645" class="part">Force Reset</text>
  <line x1="400" y1="630" x2="490" y2="630" marker-end="url(#arrow-right)" />
  <text x="445" y="622" class="label">Reset</text>

  <rect x="40" y="150" width="140" height="60" />
  <text x="110" y="175" class="title">5V Input</text>
  <text x="110" y="195" class="part">Charger Pogo</text>
  <line x1="180" y1="180" x2="230" y2="180" marker-end="url(#arrow-right)" />
  <text x="205" y="172" class="label">5V</text>

  <rect x="40" y="240" width="140" height="60" />
  <text x="110" y="265" class="title">Power Source</text>
  <text x="110" y="285" class="part">BAT 150mAh</text>
  
  <line x1="180" y1="270" x2="210" y2="270" />
  <line x1="210" y1="270" x2="210" y2="450" />
  <line x1="210" y1="270" x2="230" y2="270" marker-end="url(#arrow-right)"/>
  <line x1="210" y1="360" x2="230" y2="360" marker-end="url(#arrow-right)"/>
  <line x1="210" y1="450" x2="230" y2="450" marker-end="url(#arrow-right)"/>
  <text x="205" y="320" class="label" text-anchor="end" transform="rotate(-90 205 320)">V_BAT</text>

  <rect x="40" y="510" width="140" height="60" />
  <text x="110" y="535" class="title">Bone Conduction</text>
  <text x="110" y="555" class="part">Speaker</text>
  <line x1="240" y1="540" x2="190" y2="540" marker-end="url(#arrow-left)" />
  <text x="215" y="532" class="label">Analog</text>

  <text x="610" y="75" class="title">BLE ANT</text>
  <path d="M 610 150 L 610 110" />
  <path d="M 610 110 L 590 85 L 630 85 Z" />

</svg>
